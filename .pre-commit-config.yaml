# Pre-commit hooks configuration
# See https://pre-commit.com for more information
#
# Install hooks: pre-commit install --hook-type pre-commit --hook-type commit-msg
# Run manually:  pre-commit run --all-files
# Skip hooks:    git commit --no-verify

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: lint-skill-frontmatter
        name: Validate SKILL.md frontmatter
        entry: scripts/lint-skill-frontmatter.sh
        language: script
        files: SKILL\.md$

      - id: prettier
        name: Format markdown (prettier)
        entry: npx prettier --write --list-different
        language: system
        types: [markdown]
        exclude: CLAUDE\.md$

      - id: rust-format
        name: Rust format (cargo fmt --check)
        entry: scripts/check-rust-crates.sh fmt
        language: script
        files: ^.+/(Cargo\.toml|Cargo\.lock|src/.*\.rs|tests/.*\.rs)$

      - id: rust-clippy
        name: Rust lint (cargo clippy)
        entry: scripts/check-rust-crates.sh clippy
        language: script
        files: ^.+/(Cargo\.toml|Cargo\.lock|src/.*\.rs|tests/.*\.rs)$

      - id: rust-tests
        name: Rust tests (cargo test)
        entry: scripts/check-rust-crates.sh test
        language: script
        files: ^.+/(Cargo\.toml|Cargo\.lock|src/.*\.rs|tests/.*\.rs)$

      - id: validate-commit-message
        name: Validate commit message (50/72 rule)
        entry: scripts/validate-commit-message.sh
        language: script
        stages: [commit-msg]
