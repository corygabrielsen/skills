<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cockpit · OODA</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span class="brand">cockpit</span>
        <span class="status-dot" title="SSE status"></span>
        <span id="topbar-state">disconnected</span>
        <span style="flex: 1"></span>
        <span id="topbar-detail" class="mono"></span>
      </header>
      <nav id="left">
        <div id="run-list">
          <div class="pane-empty">Loading runs…</div>
        </div>
      </nav>
      <main id="center-pane">
        <div class="pane-empty">Select a run to view details.</div>
      </main>
      <aside id="right-pane">
        <div class="pane-empty">Select an iteration to inspect.</div>
      </aside>
    </div>
    <div id="banner"></div>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
